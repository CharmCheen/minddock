name: CI Baseline

on:
  push:
    branches: [master, feat/**]
  pull_request:
    branches: [master]

concurrency:
  group: ci-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run CI baseline
        run: python scripts/run_ci_baseline.py
